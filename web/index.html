<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KISS Media Player</title>
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/layout.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/player.css">
<script type="module" src="/js/app.js"></script>
</head>
<body>
<header class="site-header" role="banner">
  <a href="/" class="logo">KISS Media</a>
  <div class="search-bar" role="search">
    <span aria-hidden="true">🔎</span>
    <input id="search-input" type="search" placeholder="Search… (press /)" autocomplete="off" aria-label="Search media">
    <button id="search-clear" class="icon-btn btn-sm" title="Clear">✕</button>
  </div>
  <div class="spacer"></div>
  <button id="shuffle-toggle" class="icon-btn" title="Shuffle (r)">🔀</button>
  <button id="admin-toggle" class="icon-btn hidden" title="Admin panel (a)">⚙</button>
  <button id="theme-toggle" class="icon-btn" title="Toggle theme">☀</button>
  <span id="user-name" class="text-secondary text-xs"></span>
  <button id="logout-btn" class="btn btn-ghost btn-sm">Log out</button>
  <button id="menu-btn" class="icon-btn" title="Menu" aria-label="Open sets">☰</button>
</header>

<nav id="sidebar" class="sidebar" aria-label="Sets">
  <h2>Sets</h2>
  <div id="set-list"></div>
</nav>

<div class="page" role="main">
  <div class="main-content">
    <div class="toolbar">
      <select id="filter-type" aria-label="Filter by type">
        <option value="">All</option>
        <option value="video">Video</option>
        <option value="audio">Audio</option>
      </select>
      <button id="filter-favorites" class="btn btn-ghost btn-sm">❤ Favorites</button>
      <div class="spacer"></div>
      <span id="result-count" class="text-muted text-xs"></span>
    </div>
    <div id="media-grid" class="media-grid" tabindex="0" aria-label="Media grid"></div>
  </div>
</div>

<aside id="player" class="player open" aria-label="Player">
  <div class="stage">
    <video id="media-video" playsinline controlslist="nodownload"></video>
    <audio id="media-audio" class="hidden"></audio>
    <div id="big-play" class="big-play" role="button" aria-label="Play" tabindex="0">
      <div class="play-icon">▶</div>
    </div>
  </div>
  <div class="controls">
    <button id="btn-play" class="icon-btn" aria-label="Play/Pause (Space/p)">▶</button>
    <div class="time" id="time-elapsed">0:00</div>
    <div id="progress-track" class="progress-track" tabindex="0" aria-label="Seek">
      <div id="progress-fill" class="progress-fill"></div>
      <div id="progress-thumb" class="progress-thumb" aria-hidden="true"></div>
    </div>
    <div class="time" id="time-total">0:00</div>
    <button id="btn-prev" class="icon-btn" aria-label="Previous">⏮</button>
    <button id="btn-next" class="icon-btn" aria-label="Next">⏭</button>
    <div class="volume-control">
      <button id="btn-mute" class="icon-btn" aria-label="Mute">🔊</button>
      <input id="volume-slider" type="range" min="0" max="1" step="0.05" value="1" class="volume-slider" aria-label="Volume">
    </div>
    <button id="btn-fullscreen" class="icon-btn" aria-label="Fullscreen (f)">⛶</button>
  </div>
</aside>

<footer class="toast" id="toast" role="status" aria-live="polite"></footer>

<!-- Notes Modal -->
<div id="notes-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="notes-title">
  <div class="modal">
    <div class="modal-header">
      <h3 id="notes-title">Notes</h3>
      <div class="spacer"></div>
      <button id="notes-close" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <textarea id="notes-textarea" rows="6" placeholder="Add your notes…"></textarea>
    <div class="flex justify-end gap-2 mt-1">
      <button id="notes-delete" class="btn btn-danger btn-sm">Delete</button>
      <button id="notes-save" class="btn btn-primary btn-sm">Save</button>
    </div>
  </div>
</div>

<!-- Admin Modal -->
<div id="admin-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="admin-title">
    <div class="modal modal-wide">
    <div class="modal-header">
      <h3 id="admin-title">Admin</h3>
      <div class="spacer"></div>
      <button id="admin-close" class="icon-btn" aria-label="Close">✕</button>
    </div>
    <div class="flex gap-4 flex-wrap">
      <section class="flex-1-18">
        <h4 class="my-1 text-90">Users</h4>
        <div id="admin-users"></div>
        <form id="admin-user-form" class="mt-2">
          <input name="username" placeholder="Username" required autocomplete="off">
          <input type="password" name="password" placeholder="Password" required autocomplete="new-password">
          <label class="flex align-center gap-1 text-xs">
            <input type="checkbox" name="is_admin"> Admin
          </label>
          <button type="submit" class="btn btn-primary btn-sm mt-1">Add user</button>
        </form>
      </section>
      <section class="flex-1-18">
        <h4 class="my-1 text-90">Permissions</h4>
        <div id="admin-permissions"></div>
      </section>
    </div>
    <div class="flex gap-2 mt-3">
      <button id="admin-rescan" class="btn btn-primary btn-sm">Trigger rescan</button>
      <button id="admin-trash" class="btn btn-danger btn-sm">View trash</button>
    </div>
  </div>
</div>
</body>
</html>
